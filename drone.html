<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERONIX - Premium Drone Technology</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="drone.css">
    <script src="navbar.js" defer></script>
</head>
<body class="light-mode page-fixed-nav">
    <div id="nav-root"></div>

    <!-- Products Section -->
    <section class="products-section" id="productsSection">
        <div class="container">
            <p class="section-header">Showing 8 of 8 drones</p>

            <div class="row g-4" id="productsGrid">
                <!-- Products will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Configurator Page -->
    <div class="configurator-page" id="configuratorPage">
        <div class="config-header">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center">
                    <button class="btn-back" onclick="closeConfigurator()">
                        <i class="bi bi-arrow-left"></i> Back to Models
                    </button>
                    <h4 class="mb-0 config-product-name" id="configProductName"></h4>
                    <div class="config-spacer"></div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row">
                <div class="col-lg-6 mb-4">
                    <div class="config-summary-card">
                        <div class="product-image-container config-image-container">
                            <img id="configProductImage" src="" alt="" class="product-image">
                        </div>

                        <div class="summary-box">
                            <h5 class="config-summary-title">Configuration Summary</h5>

                            <div class="summary-row">
                                <span class="summary-label">Base Model</span>
                                <span class="summary-value" id="summaryModel">Aeronix SkyHawk X1 - ₹6,999</span>
                            </div>

                            <div class="summary-row">
                                <span class="summary-label">Camera</span>
                                <span class="summary-value" id="summaryCamera">Standard 4K</span>
                            </div>

                            <div class="summary-row">
                                <span class="summary-label">Battery</span>
                                <span class="summary-value" id="summaryBattery">Standard (28 min)</span>
                            </div>


                            <div class="summary-total">
                                <span>Total</span>
                                <span class="total-price" id="summaryTotal">₹6,999</span>
                            </div>
                        </div>

                        <div class="modal-actions">
                            <button class="btn-reset" onclick="resetConfig()">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                            <button class="btn-save" onclick="addToCart()">
                                <i class="bi bi-cart-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="config-options-card">
                        <div class="config-section">
                            <h6 class="config-title">Select Model</h6>
                            <div id="modelOptions"></div>
                        </div>

                        <div class="config-section">
                            <h6 class="config-title">Camera System</h6>
                            <div id="cameraOptions"></div>
                        </div>

                        <div class="config-section">
                            <h6 class="config-title">Battery Pack</h6>
                            <div id="batteryOptions"></div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-root" data-tagline="Redefining aerial excellence with next-generation drone technology."></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="session.js" defer></script>
    <script src="cart.js" defer></script>
    <script src="cart-template.js" defer></script>
    <script src="footer.js" defer></script>
    <script src="drone.js" defer></script>
    <script src="script.js" defer></script>

    <div id="cart-root"></div>
</body>
</html>
